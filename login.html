<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="./login.css" />
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>
    <main id="main-layout">
        <div id="login-form">
            <div id="logo" >
                <img src="./assets/SFC Logo.svg" alt="logo image"/>
            </div>
            <div id="form-data">
                <h1 class="title">تسجيل دخول المزرعة</h1>
                <form id="user-data" dir="rtl">
                    <div id="inputs-container"></div>
                    <div class="action">
                        <button class="btn-one"><p class="btn-text">تسجيل الدخول</p></button>
                        <button class="btn-two">نسيت كلمة السر؟</button>
                    </div>
                </form>
            </div>
            <hr class="hr-line"/>
            <p class="text">ليس لديك حساب؟ <a>سجل الآن</a></p>
        </div>
        <div id="img-container">
            <img id="image" src="./assets/547aff3936fbfad94b7a16613a03c39a3a841157.jpg" alt="login-image"/>
        </div>
    </main>
    <script src="./login.js"></script>
</body>
</html>
