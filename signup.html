<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب مزرعة جديدة</title>
    <link rel="stylesheet" href="./signup.css"/>
    <link rel="stylesheet" href="./style.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main id="main-layout" >
        <div id="signup-data">
            <div id="signup-logo">
                <img src="./assets/SFC Logo.svg" alt="logo-image"/>
            </div>
            <div id="signup-form-data">
                <h1 id="form-title">تسجيل حساب مزرعة جديدة</h1>
                <form id="user-data" dir="rtl">
                    <div id="inputs-container"></div>
                    <div class="action">
                        <button type="submit" id="submit-btn"><p id="btn-text">تسجيل مزرعة جديدة</p></button>
                    </div>
                </form>
            </div>
            <hr class="hr-line"/>
            <p class="text">لديك حساب مزرعة بالفعل؟<a href="./login.html">سجل الدخول الآن</a></p>
        </div>
        <div id="image-container">
            <img id="image" src="./assets/547aff3936fbfad94b7a16613a03c39a3a841157.jpg" alt="login-image"/>
        </div>
    </main>
    <script src="./signup.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
